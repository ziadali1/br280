name: Coleta de trânsito (SFS <-> Joinville)

on:
  # GATILHO PRINCIPAL: disparado por um agendador externo (ex: cron-job.org)
  # via API workflow_dispatch, de hora em hora. Veja docs/AGENDAMENTO.md.
  # Motivo: o agendador interno do GitHub (schedule, abaixo) é best-effort —
  # atrasa e descarta runs em horários de pico, gerando buracos na coleta.
  workflow_dispatch:

  # FALLBACK: cron nativo do GitHub. Não-confiável (pode pular execuções), mas
  # serve de rede de segurança. Minuto :17 para evitar o pico do :00.
  # Janela 05h-00h SP (UTC-3): UTC 08-23 e 00-03.
  schedule:
    - cron: "17 0-3,8-23 * * *"

# Evita execuções sobrepostas se uma demorar
concurrency:
  group: traffic-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        working-directory: scraper
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Rodar coletor
        working-directory: scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scrape.py

      - name: Salvar artifacts de debug (em caso de falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug-${{ github.run_id }}
          path: scraper/artifacts/
          retention-days: 7
          if-no-files-found: ignore
